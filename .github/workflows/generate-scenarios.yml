name: Generate Scenarios

on:
  push:
    branches: [main]
    paths:
      - 'scenarios/**'
  pull_request:
    paths:
      - 'scenarios/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run generate

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code src/data/scenarios.ts || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit generated file
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scenarios.ts
          git commit -m "chore: regenerate scenarios.ts from markdown sources"
          git push

      - name: Fail PR if generated file is stale
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::scenarios.ts is out of date. Run 'npm run generate' and commit the result."
          exit 1
